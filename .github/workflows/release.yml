name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - run: npm run pack

      - name: Patch download URL
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('system.json', 'utf8'));
            m.download = 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/stonetop.zip';
            fs.writeFileSync('system.json', JSON.stringify(m, null, '\t'));
          "

      - name: Create zip
        run: |
          zip -r stonetop.zip \
            system.json template.json stonetop.js LICENSE src/ styles/ languages/ assets/ templates/ packs/ \
            --exclude "packs/src/*"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            stonetop.zip
            system.json
